name: CI_Merge
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  #-------------#
  #--- BUILD ---#
  #-------------#
  build:
    runs-on: ubuntu-latest
    steps:
      - name: init
        uses: actions/checkout@v6
      - name: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: tk
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: uv_sync
        run: uv sync --frozen --group docs
      - name: docs
        run: uv run docs/build_docs.py
      - name: pages_configure
        uses: actions/configure-pages@v5
      - name: pages_artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build/html
          retention-days: 14
  #--------------#
  #--- DEPLOY ---#
  #--------------#
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: pages_deploy
        id: deployment
        uses: actions/deploy-pages@v4
