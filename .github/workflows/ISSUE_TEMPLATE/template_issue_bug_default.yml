name: Bug Report
description: File a bug report.
title: "[Bug]: "
type: bug
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What exactly happened?
      value: "A bug happened!"
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      options:
      default: 0
    validations:
      required: true
  - type: textarea
    id: bug_reproducibility
    attributes:
      label: Steps to reproduce the bug
      description: Please add steps to reproduce the bug
      placeholder: "1., 2., 3., 4., ..."
      value: ""
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output.
      render: shell
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    id: bug_additional_info
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: Important additional info
      value: ""
    validations:
      required: false