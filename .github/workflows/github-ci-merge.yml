name: CI_Merge
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  #-------------#
  #--- BUILD ---#
  #-------------#
  build:
    runs-on: ubuntu-latest
    env:
      PYDPEET_DOC_VERSION: latest
    steps:
      - name: init
        uses: actions/checkout@v6
      - name: python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: tk
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: uv_sync
        run: uv sync --frozen --group docs
      - name: docs
        run: uv run docs/build_docs.py
      - name: prepare_pages
        run: |
          mkdir -p docs/_public/latest
          cp -r docs/_build/html/* docs/_public/latest/

          cat > docs/_public/index.html <<'EOF'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=latest/">
          <a href="latest/">Go to latest documentation</a>
          EOF
      - name: upload_docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-latest
          path: docs/_public/
          retention-days: 14
  #--------------#
  #--- DEPLOY ---#
  #--------------#
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout_gh_pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: download_docs
        uses: actions/download-artifact@v4
        with:
          name: docs-latest
          path: docs-latest
      - name: update_latest
        run: |
          rm -rf gh-pages/latest
          mkdir -p gh-pages/latest
          cp -r docs-latest/latest/* gh-pages/latest/

          cp docs-latest/index.html gh-pages/index.html

          touch gh-pages/.nojekyll
      - name: commit_and_push
        run: |
          cd gh-pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add latest index.html .nojekyll

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update latest documentation"
            git push origin gh-pages
          fi